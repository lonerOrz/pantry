name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'Cargo.toml'

  workflow_dispatch:
    inputs:
      force_release:
        description: 'Force release even if tag exists'
        required: false
        type: boolean
        default: false
      verbose:
        description: 'Enable verbose logging'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  check-release:
    name: Check Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}
      should_release: ${{ steps.should_release.outputs.result }}
      tag_exists: ${{ steps.check_tag.outputs.exists }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from Cargo.toml
        id: get_version
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Check if tag exists on remote
        id: check_tag
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.get_version.outputs.VERSION }}" | grep -q "refs/tags/v"; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Determine if release is needed
        id: should_release
        run: |
          TAG_EXISTS="${{ steps.check_tag.outputs.exists }}"
          FORCE="${{ inputs.force_release || 'false' }}"
          
          if [ "$TAG_EXISTS" = "false" ] || [ "$FORCE" = "true" ]; then
            echo "result=true" >> $GITHUB_OUTPUT
          else
            echo "result=false" >> $GITHUB_OUTPUT
          fi

  tag:
    name: Create Tag
    runs-on: ubuntu-latest
    needs: check-release
    if: ${{ needs.check-release.outputs.should_release == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and Push Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          VERSION="${{ needs.check-release.outputs.version }}"
          FORCE="${{ inputs.force_release || 'false' }}"
          TAG_EXISTS="${{ needs.check-release.outputs.tag_exists }}"

          if [ "$FORCE" = "true" ] && [ "$TAG_EXISTS" = "true" ]; then
            echo "Forcing tag update..."
            git tag -fa "v$VERSION" -m "Release v$VERSION"
            git push --force origin "v$VERSION"
          elif [ "$TAG_EXISTS" = "false" ]; then
            git tag -a "v$VERSION" -m "Release v$VERSION"
            git push origin "v$VERSION"
          fi

  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: [check-release, tag]
    if: ${{ needs.check-release.outputs.should_release == 'true' }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: pantry
            asset_suffix: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: pantry
            asset_suffix: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: pantry
            asset_suffix: aarch64-apple-darwin
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set version
        run: echo "VERSION=${{ needs.check-release.outputs.version }}" >> $GITHUB_ENV

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}

      - name: Install Linux Dependencies
        if: ${{ runner.os == 'Linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libglib2.0-dev \
            libgdk-pixbuf2.0-dev \
            libpango1.0-dev \
            libcairo2-dev \
            libgraphene1.0-dev \
            pkg-config

      - name: Install macOS Dependencies
        if: ${{ runner.os == 'macOS' }}
        run: |
          brew install gtk4 glib pango gdk-pixbuf cairo graphene pkg-config

      - name: Build Release Binary
        run: |
          if [ "${{ inputs.verbose || 'false' }}" = "true" ]; then
            cargo build --release --target ${{ matrix.target }} --verbose
          else
            cargo build --release --target ${{ matrix.target }}
          fi
          
          BINARY_NAME="pantry-v${{ env.VERSION }}-${{ matrix.asset_suffix }}"
          mv "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" \
             "target/${{ matrix.target }}/release/$BINARY_NAME"
          
          echo "BINARY_NAME=$BINARY_NAME" >> $GITHUB_ENV

      - name: Create Release Archive (Linux)
        if: ${{ runner.os == 'Linux' }}
        run: |
          cd "target/${{ matrix.target }}/release"
          tar -czvf "$BINARY_NAME.tar.gz" "$BINARY_NAME"

      - name: Create Release Archive (macOS)
        if: ${{ runner.os == 'macOS' }}
        run: |
          cd "target/${{ matrix.target }}/release"
          
          # Create app bundle structure
          mkdir -p "pantry.app/Contents/MacOS"
          mkdir -p "pantry.app/Contents/Resources"
          cp "$BINARY_NAME" "pantry.app/Contents/MacOS/pantry"
          
          # Create Info.plist
          cat > "pantry.app/Contents/Info.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>pantry</string>
              <key>CFBundleIdentifier</key>
              <string>io.github.lonerorz.pantry</string>
              <key>CFBundleName</key>
              <string>pantry</string>
              <key>CFBundleVersion</key>
              <string>${{ env.VERSION }}</string>
              <key>CFBundleShortVersionString</key>
              <string>${{ env.VERSION }}</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>LSMinimumSystemVersion</key>
              <string>10.15</string>
          </dict>
          </plist>
          EOF
          
          tar -czvf "$BINARY_NAME.tar.gz" "pantry.app"

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_suffix }}
          path: target/${{ matrix.target }}/release/*.tar.gz
          retention-days: 5

  build-nix:
    name: Build (Nix)
    runs-on: ubuntu-latest
    needs: [check-release, tag]
    if: ${{ needs.check-release.outputs.should_release == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Build Nix Package
        run: |
          nix build .#pantry

      - name: Create Nix Release Archive
        run: |
          VERSION="${{ needs.check-release.outputs.version }}"
          BINARY_NAME="pantry-v${VERSION}-nix"
          mkdir -p "nix-release"
          cp result/bin/pantry "nix-release/"
          tar -czvf "$BINARY_NAME.tar.gz" -C nix-release .

      - name: Upload Nix Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nix
          path: nix-release/*.tar.gz
          retention-days: 5

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [check-release, build, build-nix]
    if: ${{ needs.check-release.outputs.should_release == 'true' }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-release.outputs.version }}
          name: v${{ needs.check-release.outputs.version }}
          files: artifacts/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
